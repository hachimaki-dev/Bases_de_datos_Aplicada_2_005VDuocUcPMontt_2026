<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Laboratorio Virtual Relacional - Interfaz orientada a agentes IA para Base de Datos Oracle">
    <title>Laboratorio Virtual Relacional - AI Enabled</title>

    <!-- Fuentes modernas para UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS puro CDN sin dependencias locales -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Ajustes scrollbar no soportados por config rápida */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
            border: 2px solid #0f172a;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Ocultar App inicialmente mientras carga components */
        [v-cloak] {
            display: none;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-100 antialiased overflow-hidden selection:bg-indigo-500/30 selection:text-white">

    <!-- Contenedor principal de Vue -->
    <div id="app" v-cloak>
        <!-- Skeleton Loader inicial de estilo premium (desaparece rápido si Vue carga) -->
        <div
            class="h-screen flex flex-col items-center justify-center gap-6 text-slate-400 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
            <div class="relative flex items-center justify-center">
                <svg class="w-16 h-16 animate-spin text-indigo-500/50" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <div class="absolute inset-0 bg-indigo-500/20 blur-xl rounded-full animate-pulse"></div>
            </div>

            <div class="text-center space-y-2">
                <p class="font-mono text-xs text-indigo-400 tracking-[0.3em] font-bold">INICIALIZANDO MOTOR</p>
                <p class="font-sans text-sm text-slate-500/80">Laboratorio Virtual Relacional</p>
            </div>
        </div>
    </div>

    <!-- 
        Carga silenciosa, modular y asíncrona usando Native ES Modules.
        Los Agentes IA pueden modificar componentes individuales dentro de /js/ sin tocar este archivo
    -->
    <script type="module" src="./js/app.js"></script>
</body>

</html>
